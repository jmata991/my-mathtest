<script>
function handlePanic() {
    // Check if a URL is already saved
    let savedUrl = localStorage.getItem('panicUrl');

    if (!savedUrl) {
        // First time click: Ask for a website
        let choice = prompt("Enter the full URL for Panic Mode (include http:// or https://):", "https://clever.com");
        
        if (choice) {
            localStorage.setItem('panicUrl', choice);
            alert("Panic destination set! Click again to trigger.");
        }
    } else {
        // Second click onwards: Redirect
        window.location.href = savedUrl;
    }
}

<script>
function downloadPage() {
    // 1. Capture the full HTML content
    const htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    
    // 2. Create the Blob
    const blob = new Blob([htmlContent], { type: 'text/html' });
    
    // 3. Create a temporary download link
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-mathv1.5.html';
    
    // 4. Trigger the download and cleanup
    document.body.appendChild(a); // Necessary for some browsers
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>

            <script>
                function launchInBlank() {
                    // Open a new about:blank window
                    const win = window.open('about:blank', '_blank');
                    if (!win) {
                        alert("Please allow pop-ups to use this feature.");
                        return;
                    }

                    // Get current page URL or set a specific one
                    const url = window.location.href;

                    // Create an iframe to fill the new window
                    const iframe = win.document.createElement('iframe');
                    iframe.src = url;
                    iframe.style.position = 'fixed';
                    iframe.style.top = '0';
                    iframe.style.left = '0';
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    iframe.style.border = 'none';

                    // Append iframe to the new window's body
                    win.document.body.appendChild(iframe);
                    win.document.body.style.margin = '0';
                    win.document.body.style.padding = '0';
                }
            </script>
